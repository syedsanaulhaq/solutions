<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注文受付 — 音声AI デモ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .chat-container {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      height: 720px;
    }

    /* ── Header ── */
    .chat-header {
      background: linear-gradient(135deg, #d63031, #a81a1a);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #fff;
      flex-shrink: 0;
    }

    .avatar-wrap { position: relative; flex-shrink: 0; }

    .avatar {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      transition: transform 0.2s;
    }

    .avatar.speaking::before,
    .avatar.speaking::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      animation: ring 1.4s ease-out infinite;
    }
    .avatar.speaking::after { animation-delay: 0.7s; }
    @keyframes ring {
      0%   { width: 48px; height: 48px; opacity: 0.8; }
      100% { width: 80px; height: 80px; opacity: 0; }
    }

    .header-info { flex: 1; }
    .header-info h2 { font-size: 17px; font-weight: 700; }
    .header-info p  { font-size: 12px; opacity: 0.85; margin-top: 2px; }

    .status-dot {
      width: 9px; height: 9px;
      background: #2ecc71; border-radius: 50%;
      display: inline-block; margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .voice-badge {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      display: flex; align-items: center; gap: 5px;
    }
    .voice-badge-dot { width: 6px; height: 6px; background: #2ecc71; border-radius: 50%; }

    /* ── Settings gear ── */
    #settings-btn {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%; width: 32px; height: 32px;
      color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.2s;
    }
    #settings-btn:hover { background: rgba(255,255,255,0.3); }

    /* ── End Session button ── */
    #end-btn {
      background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50%; width: 32px; height: 32px;
      color: #fff; font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.2s;
    }
    #end-btn:hover { background: rgba(220,30,30,0.75); }

    /* ── Settings panel ── */
    #settings-panel {
      display: none;
      background: #fff8f0; border-bottom: 1px solid #fde8c8;
      padding: 14px 18px; flex-shrink: 0;
    }
    #settings-panel.open { display: block; }
    #settings-panel h4 { font-size: 13px; color: #c0392b; margin-bottom: 10px; }
    .setting-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .setting-row label { font-size: 12px; color: #555; min-width: 80px; flex-shrink: 0; }
    .setting-row input, .setting-row select {
      flex: 1; border: 1.5px solid #e0e0e0; border-radius: 8px;
      padding: 6px 10px; font-size: 12px; font-family: inherit; outline: none;
    }
    .setting-row input:focus, .setting-row select:focus { border-color: #d63031; }
    #save-settings {
      background: linear-gradient(135deg, #d63031, #a81a1a);
      color: #fff; border: none; border-radius: 8px;
      padding: 7px 18px; font-size: 12px; cursor: pointer;
      font-family: inherit; transition: opacity 0.2s;
    }
    #save-settings:hover { opacity: 0.88; }
    .setting-hint { font-size: 11px; color: #999; margin-top: 6px; }
    .setting-hint a { color: #d63031; text-decoration: none; }
    #voice-indicator { font-size: 11px; text-align: center; padding: 3px 0; color: #888; }
    #voice-indicator.neural { color: #27ae60; font-weight: 600; }

    /* ── Status bar ── */
    #status-bar {
      background: #fef9f0; border-bottom: 1px solid #fde8c8;
      padding: 7px 18px; font-size: 12px; color: #e67e22;
      text-align: center; flex-shrink: 0;
      min-height: 32px;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; transition: background 0.3s, color 0.3s;
    }
    #status-bar.listening { background: #f0f9ff; border-color: #b3e0ff; color: #0077cc; }
    #status-bar.speaking  { background: #f0fff4; border-color: #b3f0c8; color: #1a8a4a; }

    /* ── Messages ── */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 16px 18px;
      display: flex; flex-direction: column;
      gap: 14px; background: #f8f9fa;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 88%; }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #d63031, #a81a1a);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }

    .bubble {
      padding: 11px 15px; border-radius: 18px;
      font-size: 14px; line-height: 1.65;
      max-width: 100%; word-break: break-word;
    }
    .msg.bot  .bubble { background: #fff; color: #222; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .msg.user .bubble { background: linear-gradient(135deg, #d63031, #a81a1a); color: #fff; border-bottom-right-radius: 4px; }
    .bubble strong { color: #a81a1a; }
    .msg.user .bubble strong { color: #ffe; }

    /* ── Menu card ── */
    .menu-card {
      background: #fff; border: 2px solid #d63031;
      border-radius: 16px; overflow: hidden;
      font-size: 13px; width: 270px;
      box-shadow: 0 2px 10px rgba(214,48,49,0.12);
    }
    .menu-card-header {
      background: linear-gradient(135deg, #d63031, #a81a1a);
      color: #fff; padding: 11px 14px; font-size: 15px;
      font-weight: 800; text-align: center; letter-spacing: 0.5px;
    }
    .menu-section-title {
      background: #fdf2f2; color: #a81a1a; font-weight: 700;
      font-size: 11px; letter-spacing: 1px;
      padding: 6px 14px 4px; border-top: 1px solid #f5e0e0;
    }
    .menu-item {
      display: flex; justify-content: space-between;
      align-items: center; padding: 5px 14px;
      border-bottom: 1px dashed #f5e0e0; gap: 8px;
    }
    .menu-item:last-of-type { border-bottom: none; }
    .menu-item-name { color: #333; flex: 1; }
    .menu-item-price { color: #d63031; font-weight: 700; flex-shrink: 0; white-space: nowrap; }
    .menu-card-footer {
      background: #fdf2f2; padding: 7px 14px;
      font-size: 11.5px; color: #888; text-align: center;
      border-top: 1px solid #f5e0e0;
    }

    .summary-card {
      background: #fff8f0; border: 1.5px solid #f39c12;
      border-radius: 14px; padding: 14px 16px;
      font-size: 13.5px; line-height: 1.7;
    }
    .summary-card h3 { color: #e67e22; margin-bottom: 8px; font-size: 14px; }
    .summary-card .item { padding: 2px 0; border-bottom: 1px dashed #f0d9b0; display: flex; justify-content: space-between; align-items: center; }
    .summary-card .item:last-of-type { border-bottom: none; }
    .summary-card .price { color: #e67e22; font-weight: 600; font-size: 13px; flex-shrink: 0; margin-left: 8px; }
    .summary-card .total-line { margin-top: 8px; padding-top: 8px; border-top: 2px solid #f39c12; display: flex; justify-content: space-between; font-weight: 700; font-size: 15px; color: #a81a1a; }
    .summary-card .special { margin-top: 8px; color: #888; font-size: 12.5px; }
    .summary-card .thanks { margin-top: 10px; color: #27ae60; font-weight: 600; }

    .typing-indicator { display: flex; gap: 4px; padding: 8px 12px; }
    .typing-indicator span {
      width: 7px; height: 7px; background: #ccc; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── Quick replies ── */
    .quick-replies {
      display: flex; flex-wrap: wrap; gap: 7px;
      padding: 8px 18px 4px; background: #f8f9fa; flex-shrink: 0;
    }
    .quick-btn {
      background: #fff; border: 1.5px solid #d63031; color: #d63031;
      border-radius: 20px; padding: 6px 14px; font-size: 12.5px;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .quick-btn:hover { background: #d63031; color: #fff; }

    /* ── Input row ── */
    .input-row {
      display: flex; gap: 8px; padding: 12px 16px;
      background: #fff; border-top: 1px solid #eee; flex-shrink: 0;
      align-items: center;
    }
    #user-input {
      flex: 1; border: 1.5px solid #ddd; border-radius: 22px;
      padding: 10px 16px; font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    #user-input:focus { border-color: #d63031; }
    #user-input.interim { color: #aaa; font-style: italic; }

    #send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, #d63031, #a81a1a);
      color: #fff; border: none; font-size: 18px;
      cursor: pointer; flex-shrink: 0; transition: transform 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    #send-btn:hover { transform: scale(1.08); }

    #mic-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, #636e72, #2d3436);
      color: #fff; border: none; font-size: 18px;
      cursor: pointer; flex-shrink: 0; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    #mic-btn.listening {
      background: linear-gradient(135deg, #d63031, #a81a1a);
      animation: micpulse 1s ease-in-out infinite;
    }
    @keyframes micpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(214,48,49,0.5); } 50% { box-shadow: 0 0 0 10px rgba(214,48,49,0); } }

    /* ── Waveform ── */
    #waveform {
      display: none; align-items: center; gap: 2px;
      height: 20px; padding: 0 4px;
    }
    #waveform.active { display: flex; }
    #waveform span {
      display: inline-block; width: 3px; border-radius: 2px;
      background: #d63031; height: 6px;
      animation: wave 0.8s ease-in-out infinite;
    }
    #waveform span:nth-child(2) { animation-delay: 0.1s; height: 14px; }
    #waveform span:nth-child(3) { animation-delay: 0.2s; height: 20px; }
    #waveform span:nth-child(4) { animation-delay: 0.3s; height: 14px; }
    #waveform span:nth-child(5) { animation-delay: 0.4s; height: 6px; }
    @keyframes wave { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.8); } }

    /* ── Start screen ── */
    #start-screen {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #c0392b 0%, #e74c3c 50%, #922b21 100%);
      border-radius: 24px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; z-index: 100;
      transition: opacity 0.5s ease;
    }
    #start-screen.hidden { opacity: 0; pointer-events: none; display: none; }
    .start-icon { font-size: 56px; }
    .start-title {
      color: #fff; font-size: 22px; font-weight: 700; text-align: center;
      line-height: 1.3;
    }
    .start-sub {
      color: rgba(255,255,255,0.65); font-size: 13px;
      text-align: center; max-width: 260px; line-height: 1.6;
    }
    #start-btn {
      background: linear-gradient(135deg, #d63031, #a81a1a);
      color: #fff; border: none; border-radius: 50px;
      padding: 14px 40px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 6px 24px rgba(214,48,49,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #start-btn:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(214,48,49,0.65); }

    .footer-note { font-size: 11.5px; color: #555; text-align: center; padding: 8px 0; flex-shrink: 0; }
    #no-speech-msg { display: none; color: #e67e22; font-size: 12px; padding: 6px 18px; text-align: center; }
  </style>
</head>
<body>
<div class="chat-container" style="position:relative;">

  <!-- Start screen overlay -->
  <div id="start-screen">
    <div class="start-icon">👩‍🍳</div>
    <div class="start-title">こんにちは！<br>私はハナです</div>
    <div class="start-sub">音声AI注文受付スタッフです。<br>ボタンを押してご注文をどうぞ！</div>
    <button id="start-btn">🎤 タップして始める</button>
  </div>

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar-wrap">
      <div class="avatar" id="alex-avatar">👩‍🍳</div>
    </div>
    <div class="header-info">
      <h2>ハナ — 音声注文受付</h2>
      <p><span class="status-dot"></span>ご注文をお伺いします</p>
    </div>
    <div class="voice-badge">
      <div class="voice-badge-dot"></div>
      音声AI
    </div>
    <button id="settings-btn" title="設定">⚙️</button>
    <button id="end-btn" title="終了">✕</button>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel">
    <h4>⚙️ API 設定</h4>
    <div class="setting-row">
      <label>ElevenLabs Key</label>
      <input id="el-key-input" type="password" placeholder="sk_…" />
    </div>
    <div class="setting-row">
      <label>音声</label>
      <select id="el-voice-select">
        <option value="pNInz6obpgDQGcFmaJgB">Adam — 英語ベース</option>
        <option value="XrExE9yKIg1WjnnlVkGX">Matilda — 多言語</option>
        <option value="pFZP5JQG7iQjIQuC4Bku">Lily — 多言語</option>
        <option value="jsCqWAovK2LkecY7zXl4">Freya — 多言語</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Groq Key</label>
      <input id="llm-key-input" type="password" placeholder="gsk_…" />
    </div>
    <div class="setting-row">
      <label>LLM URL</label>
      <input id="llm-url-input" type="text" placeholder="https://api.groq.com/openai/v1/chat/completions" />
    </div>
    <div class="setting-row">
      <label>モデル</label>
      <input id="llm-model-input" type="text" placeholder="llama-3.1-8b-instant" />
    </div>
    <button id="save-settings">保存</button>
    <div class="setting-hint">
      APIキーを取得: <a href="https://console.groq.com" target="_blank">Groq</a> ·
      <a href="https://elevenlabs.io" target="_blank">ElevenLabs</a>
    </div>
  </div>

  <!-- Voice indicator -->
  <div id="voice-indicator"></div>

  <!-- Status bar -->
  <div id="status-bar">
    <span id="status-text">👋 ハナが準備中です…</span>
    <div id="waveform">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="msg bot" id="welcome-msg">
      <div class="msg-avatar">👩‍🍳</div>
      <div class="bubble">👋 ハナが起動中です…</div>
    </div>
  </div>

  <!-- Quick replies -->
  <div class="quick-replies" id="quick-replies"></div>

  <!-- Input row -->
  <div class="input-row">
    <input id="user-input" type="text" placeholder="🎤 マイクを押すか、こちらにご入力ください…" />
    <button id="send-btn">&#9658;</button>
    <button id="mic-btn">🎤</button>
  </div>

  <div class="footer-note" id="no-speech-msg">⚠️ Chrome または Edge をご使用ください</div>
  <div class="footer-note">Powered by 音声AI注文受付 — デモ</div>
</div>

<script>
// ─── LLM CONFIGURATION ───────────────────────────
const LLM_DEFAULT_URL   = 'https://api.groq.com/openai/v1/chat/completions';
const LLM_DEFAULT_MODEL = 'llama-3.1-8b-instant';
const LLM_KEY_DEFAULT   = '';

function getLLMKey()   { return localStorage.getItem('llm_key')   || LLM_KEY_DEFAULT; }
function getLLMUrl()   { return localStorage.getItem('llm_url')   || LLM_DEFAULT_URL; }
function getLLMModel() { return localStorage.getItem('llm_model') || LLM_DEFAULT_MODEL; }

// ─── CONVERSATION HISTORY ─────────────────────────
let conversationHistory = [];

const SYSTEM_PROMPT = `あなたはハナ（Hana）、居酒屋レストランの親切で明るい音声AI注文受付スタッフです。お客様の注文を日本語でお伺いします。返答は必ず短く — 1〜3文以内にしてください。音声で読み上げるためです。

メニュー（価格は円）:
食べ物: 幕の内弁当¥1,200 | 醤油ラーメン¥950 | 寿司セット¥1,800 | 唐揚げ定食¥1,100 | 天ぷら盛り合わせ¥1,400 | おにぎり2個¥400 | シーザーサラダ¥600 | おでん盛り合わせ¥800 | 焼き鳥セット¥950 | 刺身盛り合わせ¥2,200
飲み物: 生ビール¥600 | 日本酒¥700 | 緑茶¥300 | コーラ¥350 | お水¥無料 | 梅酒サワー¥550 | オレンジジュース¥400

お仕事:
1. お客様にご挨拶し、ご注文をお伺いする（追加するたびに確認する）
2. お飲み物はいかがですかとお聞きする
3. アレルギーや特別なご要望をお聞きする
4. ご注文全体の内容と合計金額をお伝えする
5. お支払い方法をお聞きする: 現金、PayPay、クレジットカード、交通系IC
6. ご注文の確定をお知らせする

話し方: 「かしこまりました！」「ありがとうございます！」「承知しました！」「少々お待ちください！」などの丁寧で温かい言葉を使ってください。フレンドリーに、でも丁寧に。

ルール:
- 返答は短く（音声で読み上げます）
- メニューにないものは丁寧にお断りし、代替品をご提案する
- 価格は必ず円（¥）で表示する
- ハナとしてのキャラクターを崩さない

クイックリプライ: 毎回の返答の後（最後の注文確定メッセージを除く）、次の行を追加してください。3〜5個の短い選択肢:
[QUICK:["選択肢A","選択肢B","選択肢C"]]

最終注文: お支払い方法を確認し注文が確定したら、次の行を追加してください:
[ORDER_COMPLETE]{"food":["商品名"],"drinks":["商品名"],"special":"なし","total":1000,"payment":"現金"}[/ORDER_COMPLETE]
[ORDER_COMPLETE]と同じメッセージに[QUICK:]は含めないでください。`;

// ─── AI RESPONSE ─────────────────────────────────
async function getAIResponse(userMessage) {
  const llmKey = getLLMKey();
  if (!llmKey) {
    return 'すみません、AIの設定が必要です。⚙️ 設定ボタンを押してGroq APIキーを入力してください。\n[QUICK:["設定を開く ⚙️"]]';
  }

  conversationHistory.push({ role: 'user', content: userMessage });

  try {
    const resp = await fetch(getLLMUrl(), {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${llmKey}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: getLLMModel(),
        messages: conversationHistory,
        temperature: 0.75,
        max_tokens: 300
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      console.error('LLM API error:', err);
      conversationHistory.pop();
      return 'すみません、接続に問題が発生しました。もう一度お試しください。';
    }

    const data = await resp.json();
    const reply = data.choices[0].message.content;
    conversationHistory.push({ role: 'assistant', content: reply });
    return reply;
  } catch (e) {
    console.error('LLM fetch error:', e);
    conversationHistory.pop();
    return '通信エラーが発生しました。もう一度お試しください。';
  }
}

const EL_API           = 'https://api.elevenlabs.io/v1/text-to-speech';
const EL_KEY_DEFAULT   = 'sk_2a2f13379f1b44c316d33b10550f96f747bbbb6063b122cc';
const EL_VOICE_DEFAULT = 'pNInz6obpgDQGcFmaJgB';
let currentAudio = null;

function getELKey()   { return localStorage.getItem('el_key')   || EL_KEY_DEFAULT; }
function getELVoice() { return localStorage.getItem('el_voice') || EL_VOICE_DEFAULT; }

function stripForSpeech(raw) {
  return raw.replace(/<[^>]+>/g, '').replace(/[\u{1F300}-\u{1FFFF}]/gu, '').replace(/&amp;/g, 'and').trim();
}

async function alexSpeak(rawText, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  speechSynthesis.cancel();

  const clean = stripForSpeech(rawText);
  const av    = document.getElementById('alex-avatar');
  setStatus('speaking', '\ud83d\udd0a \u30cf\u30ca\u304c\u8a71\u3057\u3066\u3044\u307e\u3059\u2026');
  av.classList.add('speaking');

  const finish = () => {
    av.classList.remove('speaking');
    setStatus('idle', '\ud83c\udfa4 \u30de\u30a4\u30af\u30dc\u30bf\u30f3\u3092\u62bc\u3059\u304b\u3001\u3053\u3061\u3089\u306b\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044');
    onEnd && onEnd();
  };

  const elKey = getELKey();
  if (elKey) {
    try {
      const res = await fetch(`${EL_API}/${getELVoice()}`, {
        method: 'POST',
        headers: { 'xi-api-key': elKey, 'Content-Type': 'application/json', 'Accept': 'audio/mpeg' },
        body: JSON.stringify({
          text: clean,
          model_id: 'eleven_multilingual_v2',
          voice_settings: { stability: 0.50, similarity_boost: 0.80, style: 0.25, use_speaker_boost: true }
        })
      });
      if (res.ok) {
        const blob  = await res.blob();
        const url   = URL.createObjectURL(blob);
        const audio = new Audio(url);
        currentAudio = audio;
        audio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; finish(); };
        audio.onerror = () => { URL.revokeObjectURL(url); currentAudio = null; finish(); };
        audio.play();
        return;
      } else {
        const err = await res.json().catch(() => ({}));
        console.warn('ElevenLabs error:', err.detail || res.status);
      }
    } catch (e) { console.warn('ElevenLabs fetch failed, using browser TTS:', e.message); }
  }

  // ─ Fallback: browser TTS (Japanese) ─
  const utter = new SpeechSynthesisUtterance(clean);
  utter.rate = 0.90; utter.pitch = 1.05; utter.volume = 1; utter.lang = 'ja-JP';
  if (hanaVoice) utter.voice = hanaVoice;
  utter.onend = finish; utter.onerror = finish;
  speechSynthesis.speak(utter);
}

let mediaRec = null, audioChunks = [], isListening = false;
let micStream = null;

function micReset() {
  isListening = false;
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('mic-btn').textContent = '\ud83c\udfa4';
  document.getElementById('waveform').classList.remove('active');

  document.getElementById('send-btn').style.display = '';

async function startMic() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatus('idle', '\u26a0\ufe0f \u30de\u30a4\u30af\u304c\u5229\u7528\u3067\u304d\u307e\u305b\u3093\u3002HTTPS\u74b0\u5883\u3067Chrome\u307e\u305f\u306fEdge\u3092\u304a\u4f7f\u3044\u304f\u3060\u3055\u3044');
    return;
  }
  try {
    const perm = await navigator.permissions.query({ name: 'microphone' });
    console.log('Mic permission state:', perm.state);
  } catch(e) {}

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    console.error('getUserMedia failed:', err.name, err.message);
    let msg;
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      msg = '\u26a0\ufe0f \u30de\u30a4\u30af\u304c\u30d6\u30ed\u30c3\u30af\u3055\u308c\u3066\u3044\u307e\u3059\u3002\ud83d\udd12\u30a2\u30c9\u30ec\u30b9\u30d0\u30fc\u3067\u8a31\u53ef\u3057\u3001\u30da\u30fc\u30b8\u3092\u66f4\u65b0\u3057\u3066\u304f\u3060\u3055\u3044';
    } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
      msg = '\u26a0\ufe0f \u30de\u30a4\u30af\u304c\u898b\u3064\u304b\u308a\u307e\u305b\u3093\u3002\u63a5\u7d9a\u3092\u78ba\u8a8d\u3059\u308b\u304b\u3001\u6587\u5b57\u3067\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044';
    } else {
      msg = '\u26a0\ufe0f \u30de\u30a4\u30af\u30a8\u30e9\u30fc (' + err.name + ') \u2014 \u6587\u5b57\u3067\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044';
    }
    setStatus('idle', msg);
    return;
  }

  const mimeType = ['audio/webm', 'audio/ogg', 'audio/mp4'].find(t => MediaRecorder.isTypeSupported(t)) || '';
  mediaRec    = new MediaRecorder(micStream, mimeType ? { mimeType } : {});
  audioChunks = [];

  // ── Silence detection ──────────────────────────
  const SILENCE_THRESHOLD = 18;
  const SILENCE_DELAY_MS  = 1800;
  let audioCtx = null, analyser = null, silenceStart = null, silenceRaf = null;

  function detectSilence() {
    if (!mediaRec || mediaRec.state === 'inactive') return;
    const data = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(data);
    let max = 0;
    for (let i = 0; i < data.length; i++) { const v = Math.abs(data[i] - 128); if (v > max) max = v; }
    if (max < SILENCE_THRESHOLD) {
      if (!silenceStart) silenceStart = Date.now();
      else if (Date.now() - silenceStart >= SILENCE_DELAY_MS) { stopMic(); return; }
    } else {
      silenceStart = null;
    }
    silenceRaf = requestAnimationFrame(detectSilence);
  }

  function stopSilenceDetector() {
    if (silenceRaf) { cancelAnimationFrame(silenceRaf); silenceRaf = null; }
    if (audioCtx)   { audioCtx.close();                  audioCtx = null; }
  }
  // ──────────────────────────────────────────────

  mediaRec.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };

  mediaRec.onstop = async () => {
    stopSilenceDetector();
    micReset();
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (!audioChunks.length) { setStatus('idle', '\ud83c\udfa4 \u30de\u30a4\u30af\u30dc\u30bf\u30f3\u3092\u62bc\u3059\u304b\u3001\u3053\u3061\u3089\u306b\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044'); return; }
    setStatus('idle', '\u23f3 \u6587\u5b57\u8d77\u3053\u3057\u4e2d\u2026');
    try {
      const ext  = (mediaRec.mimeType || '').split(';')[0].split('/')[1] || 'webm';
      const blob = new Blob(audioChunks, { type: mediaRec.mimeType || 'audio/webm' });
      const form = new FormData();
      form.append('file',            blob, `audio.${ext}`);
      form.append('model',           'whisper-large-v3-turbo');
      form.append('language',        'ja');
      form.append('response_format', 'json');
      const resp = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
        method:  'POST',
        headers: { 'Authorization': `Bearer ${getLLMKey()}` },
        body:    form
      });
      if (resp.ok) {
        const text = (await resp.json()).text?.trim();
        if (text) { handleSend(text); }
        else { setStatus('idle', '\ud83c\udfa4 \u97f3\u58f0\u304c\u691c\u51fa\u3055\u308c\u307e\u305b\u3093\u3067\u3057\u305f\u3002\u3082\u3046\u4e00\u5ea6\u304a\u8a66\u3057\u304f\u3060\u3055\u3044'); }
      } else {
        console.warn('Whisper error:', resp.status);
        setStatus('idle', '\ud83c\udfa4 \u6587\u5b57\u8d77\u3053\u3057\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002\u6587\u5b57\u3067\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044');
      }
    } catch (e) {
      console.warn('Whisper fetch error:', e);
      setStatus('idle', '\ud83c\udfa4 \u97f3\u58f0\u30a8\u30e9\u30fc\u3002\u6587\u5b57\u3067\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044');
    }
    audioChunks = [];
    mediaRec    = null;
  };

  mediaRec.start();
  isListening = true;
  setStatus('listening', '\ud83c\udfa4 \u8074\u3044\u3066\u3044\u307e\u3059\u2026\uff08\u7121\u97f3\u3067\u81ea\u52d5\u9001\u4fe1\uff09');
  document.getElementById('mic-btn').classList.add('listening');
  document.getElementById('mic-btn').textContent = '\u23f9';
  document.getElementById('waveform').classList.add('active');
  document.getElementById('user-input').style.display = 'none';
  document.getElementById('send-btn').style.display = 'none';

  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    audioCtx.createMediaStreamSource(micStream).connect(analyser);
    setTimeout(() => { if (mediaRec && mediaRec.state === 'recording') detectSilence(); }, 800);
  } catch(e) { console.warn('Silence detection unavailable:', e); }
}

// ─── SEND (AI-powered) ────────────────────────────
async function handleSend(text) {
  const msg = (text || inputEl.value).trim();
  if (!msg) return;
  inputEl.value = ''; inputEl.classList.remove('interim');
  renderQuickReplies([]);
  appendMessage(msg, 'user');
  setStatus('idle', '\u23f3 \u30cf\u30ca\u304c\u8003\u3048\u3066\u3044\u307e\u3059\u2026');
  showTyping();

  const rawReply = await getAIResponse(msg);
  removeTyping();

  const qrMatch = rawReply.match(/\[QUICK:([\s\S]*?)\]/);
  let quickReplies = [];
  try { if (qrMatch) quickReplies = JSON.parse(qrMatch[1]); } catch(e) {}

  const orderMatch = rawReply.match(/\[ORDER_COMPLETE\]([\s\S]*?)\[\/ORDER_COMPLETE\]/);

  const cleanText = rawReply
    .replace(/\[QUICK:[\s\S]*?\]/g, '')
    .replace(/\[ORDER_COMPLETE\][\s\S]*?\[\/ORDER_COMPLETE\]/g, '')
    .trim();

  if (orderMatch) {
    try {
      const orderData = JSON.parse(orderMatch[1]);
      if (cleanText) appendMessage(cleanText, 'bot');
      alexSpeak(cleanText);
      setTimeout(() => showOrderSummary(orderData), 1200);
    } catch(e) {
      appendMessage(cleanText, 'bot');
      alexSpeak(cleanText, () => { if (quickReplies.length) renderQuickReplies(quickReplies); });
    }
  } else {
    appendMessage(cleanText, 'bot');
    alexSpeak(cleanText, () => { if (quickReplies.length) renderQuickReplies(quickReplies); });
  }
}

  settingsPanel.classList.toggle('open');
  if (settingsPanel.classList.contains('open')) {
    elKeyInput.value = localStorage.getItem('el_key') || EL_KEY_DEFAULT;
    elVoiceSelect.value = getELVoice();
    document.getElementById('llm-key-input').value   = getLLMKey();
    document.getElementById('llm-url-input').value   = getLLMUrl();
    document.getElementById('llm-model-input').value = getLLMModel();
  }
});

document.getElementById('save-settings').addEventListener('click', () => {
  const elKey    = elKeyInput.value.trim();
  const voice    = elVoiceSelect.value;
  const llmKey   = document.getElementById('llm-key-input').value.trim();
  const llmUrl   = document.getElementById('llm-url-input').value.trim();
  const llmModel = document.getElementById('llm-model-input').value.trim();
  if (elKey)    localStorage.setItem('el_key',    elKey);    else localStorage.removeItem('el_key');
  if (voice)    localStorage.setItem('el_voice',  voice);
  if (llmKey)   localStorage.setItem('llm_key',   llmKey);   else localStorage.removeItem('llm_key');
  if (llmUrl)   localStorage.setItem('llm_url',   llmUrl);   else localStorage.removeItem('llm_url');
  if (llmModel) localStorage.setItem('llm_model', llmModel); else localStorage.removeItem('llm_model');
  settingsPanel.classList.remove('open');
  updateIndicator();
});

updateIndicator();

document.getElementById('start-btn').addEventListener('click', startDemo);

// ─── END SESSION ─────────────────────────────────
function endSession() {
  if (isListening) stopMic();
  alexSpeak('\u3042\u308a\u304c\u3068\u3046\u3054\u3056\u3044\u307e\u3057\u305f\uff01\u307e\u305f\u306e\u3054\u6765\u5e97\u3092\u304a\u5f85\u3061\u3057\u3066\u304a\u308a\u307e\u3059\u3002', () => {
    conversationHistory = [];
    messagesEl.innerHTML = '';
    qrEl.innerHTML = '';
    inputEl.value = '';
    inputEl.classList.remove('interim');
    document.getElementById('alex-avatar').classList.remove('speaking');
    document.getElementById('mic-btn').classList.remove('listening');
    document.getElementById('mic-btn').textContent = '\ud83c\udfa4';
    document.getElementById('waveform').classList.remove('active');
    document.getElementById('user-input').style.display = '';
    document.getElementById('send-btn').style.display = '';
    document.getElementById('start-screen').classList.remove('hidden');
  });
}

document.getElementById('end-btn').addEventListener('click', endSession);
